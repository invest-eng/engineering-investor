name: Daily Market Briefing

on:
  schedule:
    # 06:30 UTC each day (~07:30/08:30 CE(S)T) — before EU open
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-briefing.mjs

      - name: Commit updated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/briefing.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(briefing): update daily market briefing"
            git push
          fi
