name: Daily Market Briefing

on:
  schedule:
    # GitHub Actions cron is best-effort — schedules during high-load times
    # (06–10 UTC) often delay 30 min to several hours. We run multiple cron
    # times in the morning; the script skips generation if today's briefing
    # already exists, so only the first successful run actually does work.
    - cron: '15 4 * * *'   # 04:15 UTC = ~06:15 SLO (less congested)
    - cron: '45 5 * * *'   # 05:45 UTC backup
    - cron: '30 8 * * *'   # 08:30 UTC safety net (always finishes by ~10 SLO)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate even if today already exists'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRIEFING_EDITION: morning
          FORCE_BRIEFING: ${{ github.event.inputs.force }}
        run: node scripts/generate-briefing.mjs

      - name: Commit updated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/briefing*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(briefing): update daily market briefing"
            git push
          fi

      - name: Build site
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
