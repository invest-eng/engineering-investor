name: Afternoon Market Briefing

on:
  schedule:
    # 17:30 SLO = 15:30 UTC — evropski trgi ravno zaprli, ZDA 2h odprta
    - cron: '30 15 * * *'   # 15:30 UTC = 17:30 SLO (glavni)
    - cron: '00 16 * * *'   # 16:00 UTC = 18:00 SLO (rezerva)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: afternoon-briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate afternoon briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRIEFING_EDITION: afternoon
          FORCE_BRIEFING: 'true'
        run: node scripts/generate-briefing.mjs

      - name: Commit updated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/briefing*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(briefing): afternoon market briefing update"
            git push
          fi

      - name: Build site
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
